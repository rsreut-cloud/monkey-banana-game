<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐵 האכילו את הקופים 🍌</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="sky">
    <div class="sun">☀️</div>
    <div class="cloud cloud1">☁️</div>
    <div class="cloud cloud2">☁️</div>
    <div class="cloud cloud3">☁️</div>
  </div>

  <header class="hud">
    <h1>🐵 האכילו את הקופים בבננות 🍌</h1>
    <div class="score">בננות שנאכלו: <span id="score">0</span> 🍌</div>
    <p class="hint">גררו בננה אל הקוף שתבחרו כדי להאכיל אותו!</p>
  </header>

  <main class="game">
    <div class="monkeys" id="monkeys"></div>
  </main>

  <footer class="banana-tray" id="tray"></footer>

  <div class="grass"></div>

  <script src="script.js"></script>
</body>
</html>
